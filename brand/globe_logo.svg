<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#02050B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes spin  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
      @keyframes spinR { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
      @keyframes spin2 { from { transform: rotate(60deg);  } to { transform: rotate(420deg);  } }
      @keyframes spin3 { from { transform: rotate(120deg); } to { transform: rotate(480deg);  } }
      @keyframes spin4 { from { transform: rotate(200deg); } to { transform: rotate(560deg);  } }
      @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes pulseText { 0%,100%{opacity:.9} 50%{opacity:1} }

      .ring1 { animation: spin  10s linear infinite; transform-origin: 140px 140px; }
      .ring2 { animation: spinR 14s linear infinite; transform-origin: 140px 140px; }
      .ring3 { animation: spin2 18s linear infinite; transform-origin: 140px 140px; }
      .ring4 { animation: spin3 8s  linear infinite; transform-origin: 140px 140px; }
      .ring5 { animation: spin4 22s linear infinite; transform-origin: 140px 140px; }

      /* Blue orbit particles */
      .orb-b1 { animation: spin  5s  linear infinite; transform-origin: 140px 140px; }
      .orb-b2 { animation: spinR 7s  linear infinite; transform-origin: 140px 140px; }
      .orb-b3 { animation: spin2 9s  linear infinite; transform-origin: 140px 140px; }
      .orb-b4 { animation: spin3 4s  linear infinite; transform-origin: 140px 140px; }
      .orb-b5 { animation: spin4 6s  linear infinite; transform-origin: 140px 140px; }

      /* White orbit particles */
      .orb-w1 { animation: spinR 8s  linear infinite; transform-origin: 140px 140px; }
      .orb-w2 { animation: spin  11s linear infinite; transform-origin: 140px 140px; }

      .glow-bg { animation: pulse 4s ease-in-out infinite; }
      .logo-text { animation: pulseText 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="280" height="280" fill="#02050B"/>

  <!-- Radial glow -->
  <circle cx="140" cy="140" r="130" fill="url(#bgGlow)" class="glow-bg"/>

  <!-- Globe outline -->
  <circle cx="140" cy="140" r="110" fill="none" stroke="#0066FF" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Static latitude lines -->
  <ellipse cx="140" cy="140" rx="110" ry="28" fill="none" stroke="#0066FF" stroke-width="0.4" stroke-opacity="0.12"/>
  <ellipse cx="140" cy="140" rx="110" ry="65" fill="none" stroke="#0066FF" stroke-width="0.4" stroke-opacity="0.08"/>
  <ellipse cx="140" cy="140" rx="110" ry="95" fill="none" stroke="#0066FF" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Rotating latitude rings (Blue) -->
  <g class="ring1">
    <ellipse cx="140" cy="140" rx="110" ry="22" fill="none" stroke="#0066FF" stroke-width="0.7" stroke-opacity="0.25" stroke-dasharray="7 5"/>
  </g>
  <g class="ring2">
    <ellipse cx="140" cy="140" rx="22" ry="110" fill="none" stroke="#0066FF" stroke-width="0.7" stroke-opacity="0.2" stroke-dasharray="5 7"/>
  </g>
  <g class="ring3">
    <ellipse cx="140" cy="140" rx="85" ry="55" fill="none" stroke="#0066FF" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="4 8" transform="rotate(35 140 140)"/>
  </g>
  <g class="ring4">
    <ellipse cx="140" cy="140" rx="55" ry="100" fill="none" stroke="#FFFFFF" stroke-width="0.4" stroke-opacity="0.1" stroke-dasharray="3 9" transform="rotate(70 140 140)"/>
  </g>
  <g class="ring5">
    <ellipse cx="140" cy="140" rx="100" ry="35" fill="none" stroke="#0066FF" stroke-width="0.4" stroke-opacity="0.12" stroke-dasharray="6 6" transform="rotate(-20 140 140)"/>
  </g>

  <!-- ======================== -->
  <!-- ORBITING PARTICLES       -->
  <!-- 60% Blue (#0066FF)       -->
  <!-- ======================== -->

  <!-- Blue particle group 1 -->
  <g class="orb-b1">
    <circle cx="250" cy="140" r="3.5" fill="#0066FF" filter="url(#glow)"/>
    <circle cx="250" cy="140" r="6"   fill="#0066FF" fill-opacity="0.2"/>
    <circle cx="30"  cy="140" r="2.5" fill="#0066FF" fill-opacity="0.5"/>
  </g>

  <!-- Blue particle group 2 -->
  <g class="orb-b2">
    <circle cx="200" cy="60"  r="3"   fill="#0066FF" filter="url(#glow)"/>
    <circle cx="200" cy="60"  r="5"   fill="#0066FF" fill-opacity="0.2"/>
    <circle cx="80"  cy="220" r="2"   fill="#0066FF" fill-opacity="0.45"/>
  </g>

  <!-- Blue particle group 3 -->
  <g class="orb-b3">
    <circle cx="140" cy="30"  r="3"   fill="#0066FF" filter="url(#glow)"/>
    <circle cx="140" cy="30"  r="5.5" fill="#0066FF" fill-opacity="0.18"/>
    <circle cx="140" cy="250" r="2"   fill="#0066FF" fill-opacity="0.4"/>
  </g>

  <!-- Blue particle group 4 -->
  <g class="orb-b4">
    <circle cx="230" cy="90"  r="2.5" fill="#0066FF" fill-opacity="0.85"/>
    <circle cx="50"  cy="190" r="2"   fill="#0066FF" fill-opacity="0.5"/>
    <circle cx="210" cy="200" r="2"   fill="#0066FF" fill-opacity="0.6"/>
    <circle cx="70"  cy="80"  r="1.5" fill="#0066FF" fill-opacity="0.7"/>
  </g>

  <!-- Blue particle group 5 -->
  <g class="orb-b5">
    <circle cx="60"  cy="110" r="2.5" fill="#0066FF" fill-opacity="0.7"/>
    <circle cx="220" cy="170" r="2"   fill="#0066FF" fill-opacity="0.5"/>
    <circle cx="170" cy="40"  r="2"   fill="#0066FF" fill-opacity="0.65"/>
    <circle cx="110" cy="245" r="2"   fill="#0066FF" fill-opacity="0.55"/>
  </g>

  <!-- ======================== -->
  <!-- WHITE PARTICLES (40%)    -->
  <!-- ======================== -->

  <!-- White particle group 1 -->
  <g class="orb-w1">
    <circle cx="220" cy="90"  r="2.5" fill="#FFFFFF" fill-opacity="0.75"/>
    <circle cx="60"  cy="190" r="2"   fill="#FFFFFF" fill-opacity="0.5"/>
    <circle cx="185" cy="230" r="1.5" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="95"  cy="50"  r="2"   fill="#FFFFFF" fill-opacity="0.65"/>
  </g>

  <!-- White particle group 2 -->
  <g class="orb-w2">
    <circle cx="240" cy="160" r="2"   fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="40"  cy="120" r="1.5" fill="#FFFFFF" fill-opacity="0.5"/>
    <circle cx="150" cy="250" r="2"   fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="130" cy="28"  r="1.5" fill="#FFFFFF" fill-opacity="0.65"/>
  </g>

  <!-- Surface dots (fixed) -->
  <circle cx="162" cy="118" r="1.5" fill="#0066FF" fill-opacity="0.7"/>
  <circle cx="118" cy="162" r="1.5" fill="#0066FF" fill-opacity="0.6"/>
  <circle cx="155" cy="158" r="1"   fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="125" cy="122" r="1"   fill="#FFFFFF" fill-opacity="0.45"/>
  <circle cx="170" cy="145" r="1"   fill="#0066FF" fill-opacity="0.5"/>
  <circle cx="110" cy="135" r="1"   fill="#0066FF" fill-opacity="0.5"/>

  <!-- Center core glow -->
  <circle cx="140" cy="140" r="45" fill="#0066FF" fill-opacity="0.04"/>
  <circle cx="140" cy="140" r="25" fill="#0066FF" fill-opacity="0.06"/>

  <!-- ======================== -->
  <!--  EURO (Blue) TAP (White) -->
  <!--  font-weight:900 italic  -->
  <!-- ======================== -->
  <g class="logo-text" filter="url(#textGlow)">
    <!-- EURO in Deep Blue #0066FF -->
    <text
      x="104" y="150"
      font-family="'Arial Black', 'Inter', sans-serif"
      font-size="30"
      font-weight="900"
      font-style="italic"
      letter-spacing="1"
      fill="#0066FF"
    >EURO</text>
    <!-- TAP in White -->
    <text
      x="181" y="150"
      font-family="'Arial Black', 'Inter', sans-serif"
      font-size="30"
      font-weight="900"
      font-style="italic"
      letter-spacing="1"
      fill="#FFFFFF"
    >TAP</text>
  </g>
</svg>
